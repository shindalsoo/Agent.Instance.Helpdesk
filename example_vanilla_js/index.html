<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객 조회 — zio_ontology.js 예제</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* 헤더 */
        .header {
            background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(99,102,241,0.08));
            border-bottom: 1px solid #1e2130;
            padding: 28px 32px;
        }
        .header h1 {
            font-size: 24px; font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .header p { color: #888; font-size: 14px; }
        .header code {
            background: rgba(255,255,255,0.08); padding: 2px 8px;
            border-radius: 4px; font-size: 13px; color: #a0cfff;
        }

        /* 레이아웃 */
        .main { display: flex; min-height: calc(100vh - 90px); }

        /* 사이드바 */
        .sidebar {
            width: 280px; min-width: 280px;
            background: rgba(255,255,255,0.02);
            border-right: 1px solid #1e2130;
            padding: 20px 16px;
        }
        .sidebar h3 {
            font-size: 12px; font-weight: 600; color: #666;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .menu-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px; border-radius: 10px;
            cursor: pointer; transition: all 0.2s;
            margin-bottom: 4px; font-size: 14px; color: #aaa;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: #ddd; }
        .menu-item.active {
            background: rgba(99,102,241,0.15); color: #a0cfff;
            border: 1px solid rgba(99,102,241,0.3);
        }
        .menu-item .icon { font-size: 18px; }

        /* 코드 미리보기 */
        .code-preview {
            background: rgba(0,0,0,0.4); border: 1px solid #2a2d35;
            border-radius: 10px; padding: 14px; margin-top: 20px;
            font-size: 12px; line-height: 1.7; color: #8be9fd;
            overflow-x: auto; white-space: pre;
        }
        .code-preview .cmt { color: #6272a4; }
        .code-preview .kw { color: #ff79c6; }
        .code-preview .fn { color: #50fa7b; }
        .code-preview .str { color: #f1fa8c; }

        /* 콘텐츠 */
        .content { flex: 1; padding: 24px 32px; overflow-x: auto; }
        .content-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px;
        }
        .content-header h2 { font-size: 20px; font-weight: 600; color: #e0e0e0; }
        .badge {
            background: rgba(99,102,241,0.15); color: #a0cfff;
            padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
        }

        /* 로딩/에러 */
        .status {
            text-align: center; padding: 60px 20px;
            color: #888; font-size: 15px;
        }
        .status.error { color: #fca5a5; }
        .spinner {
            width: 32px; height: 32px; border: 3px solid #333;
            border-top-color: #6366f1; border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 통계 바 */
        .stats-bar {
            display: flex; gap: 8px; align-items: center;
            font-size: 13px; color: #888; margin-top: 12px;
        }
        .stats-bar span { color: #a0cfff; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔗 zio_ontology.js SDK 예제</h1>
        <p>서버(main.py) 없이, <code>&lt;script src="/api/sdk/zio_ontology.js"&gt;</code> 하나로 온톨로지 데이터를 조회합니다.</p>
    </div>

    <div class="main">
        <!-- 사이드바: 예제 메뉴 -->
        <div class="sidebar">
            <h3>SDK 예제</h3>
            <div class="menu-item active" onclick="runExample('customers', this)">
                <span class="icon">👤</span> 고객 목록 조회
            </div>
            <div class="menu-item" onclick="runExample('senders', this)">
                <span class="icon">📨</span> 발신자 조회
            </div>
            <div class="menu-item" onclick="runExample('tickets', this)">
                <span class="icon">🎫</span> 티켓 조회
            </div>
            <div class="menu-item" onclick="runExample('relations', this)">
                <span class="icon">🔗</span> 관계 탐색 (out)
            </div>

            <!-- Custom RDB CRUD 섹션 추가 -->
            <div style="margin-top: 20px; border-top: 1px solid #1e2130; padding-top: 20px;">
                <h3 style="font-size: 11px; color: #555; margin-bottom: 12px;">Custom RDB CRUD</h3>
                <div class="menu-item" onclick="runCustomExample('create_table', this)">
                    <span class="icon">🏗️</span> 테이블 생성
                </div>
                <div class="menu-item" onclick="runCustomExample('insert', this)">
                    <span class="icon">➕</span> 데이터 등록
                </div>
                <div class="menu-item" onclick="runCustomExample('update', this)">
                    <span class="icon">✏️</span> 데이터 수정
                </div>
                <div class="menu-item" onclick="runCustomExample('fetch', this)">
                    <span class="icon">🔍</span> 데이터 조회
                </div>
                <div class="menu-item" onclick="runCustomExample('delete', this)">
                    <span class="icon">🗑️</span> 데이터 삭제
                </div>
            </div>

            <!-- 실행 중인 코드 미리보기 -->
            <div id="code-preview" class="code-preview">
<span class="cmt">// 좌측 메뉴를 선택하세요</span></div>
        </div>

        <!-- 메인: 결과 표시 -->
        <div class="content">
            <div class="content-header">
                <h2 id="content-title">예제를 선택하세요</h2>
                <span class="badge" id="badge" style="display:none;">0건</span>
            </div>
            <div id="result-area">
                <div class="status">👈 좌측 메뉴에서 예제를 선택하면 SDK가 데이터를 조회합니다.</div>
            </div>
            <div class="stats-bar" id="stats" style="display:none;">
                소요 시간: <span id="stat-time">0</span>ms
            </div>
        </div>
    </div>

    <!-- ═══ SDK 로드 ═══ -->
    <script src="/api/sdk/zio_ontology.js"></script>
    <script>
        // ─────────────────────────────────────────────────────
        // 예제 정의: 각 메뉴에 대응하는 SDK 호출 코드
        // ─────────────────────────────────────────────────────
        const examples = {
            customers: {
                title: "👤 고객 목록",
                code: `<span class="kw">const</span> result = <span class="kw">await</span> <span class="fn">Zio.Graph</span>
  .<span class="fn">node</span>(<span class="str">"Customer"</span>)
  .<span class="fn">fetch</span>();`,
                run: () => Zio.Graph.node("Customer").fetch(),
                render: "cards",
                titleKey: "name"
            },
            senders: {
                title: "📨 발신자 목록",
                code: `<span class="kw">const</span> result = <span class="kw">await</span> <span class="fn">Zio.Graph</span>
  .<span class="fn">node</span>(<span class="str">"Sender"</span>)
  .<span class="fn">fetch</span>();`,
                run: () => Zio.Graph.node("Sender").fetch(),
                render: "table"
            },
            tickets: {
                title: "🎫 티켓 목록",
                code: `<span class="kw">const</span> result = <span class="kw">await</span> <span class="fn">Zio.Graph</span>
  .<span class="fn">node</span>(<span class="str">"Ticket"</span>)
  .<span class="fn">fetch</span>();`,
                run: () => Zio.Graph.node("Ticket").fetch(),
                render: "table"
            },
            relations: {
                title: "🔗 고객 → 관계 탐색",
                code: `<span class="kw">const</span> result = <span class="kw">await</span> <span class="fn">Zio.Graph</span>
  .<span class="fn">node</span>(<span class="str">"Customer"</span>)
  .<span class="fn">out</span>(<span class="str">"SUBMITTED"</span>)
  .<span class="fn">fetch</span>();`,
                run: () => Zio.Graph.node("Customer").out("SUBMITTED").fetch(),
                render: "table"
            }
        };

        // ─────────────────────────────────────────────────────
        // 예제 실행
        // ─────────────────────────────────────────────────────
        async function runExample(key, el) {
            // 메뉴 활성화
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');

            const ex = examples[key];
            document.getElementById('content-title').textContent = ex.title;
            document.getElementById('code-preview').innerHTML = ex.code;
            document.getElementById('badge').style.display = 'none';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('result-area').innerHTML =
                '<div class="status"><div class="spinner"></div>데이터를 조회하고 있습니다...</div>';

            const t0 = performance.now();
            try {
                const result = await ex.run();
                const elapsed = Math.round(performance.now() - t0);

                if (ex.render === 'cards') {
                    Zio.renderCards('#result-area', result, { titleKey: ex.titleKey });
                } else {
                    Zio.renderTable('#result-area', result);
                }

                document.getElementById('badge').textContent = result.length + '건';
                document.getElementById('badge').style.display = 'inline';
                document.getElementById('stats').style.display = 'flex';
                document.getElementById('stat-time').textContent = elapsed;
            } catch (e) {
                document.getElementById('result-area').innerHTML =
                    '<div class="status error">❌ ' + e.message + '</div>';
            }
        }

        // ─────────────────────────────────────────────────────
        // Custom RDB 예제 실행
        // ─────────────────────────────────────────────────────
        const customTableName = "test_vanilla";
        let vanillaEntityId = null;

        async function runCustomExample(action, el) {
            // 메뉴 활성화
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');

            document.getElementById('badge').style.display = 'none';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('result-area').innerHTML =
                '<div class="status"><div class="spinner"></div>데이터베이스 작업을 처리하고 있습니다...</div>';

            const t0 = performance.now();
            try {
                let result = null;
                let previewCode = "";
                let title = "";

                if (action === 'create_table') {
                    title = "🏗️ 테이블 생성";
                    previewCode = `<span class="kw">await</span> <span class="fn">Zio.Graph</span>
  .<span class="fn">custom</span>(<span class="str">"${customTableName}"</span>)
  .<span class="fn">createTable</span>([
    { name: <span class="str">"id"</span>, type: <span class="str">"Integer"</span>, pk: <span class="kw">true</span> },
    { name: <span class="str">"title"</span>, type: <span class="str">"String"</span>, nullable: <span class="kw">false</span> },
    { name: <span class="str">"content"</span>, type: <span class="str">"Text"</span> }
  ], <span class="str">"바닐라테스트"</span>, <span class="str">"웹 UI 테스트용"</span>);`;

                    result = await Zio.Graph.custom(customTableName).createTable([
                        { name: "id", type: "Integer", pk: true },
                        { name: "title", type: "String", nullable: false },
                        { name: "content", type: "Text" }
                    ], "바닐라테스트", "웹 UI 테스트용");
                    
                    // 테이블 생성 후, ID 획득 시도
                    const resp = await fetch("/api/custom/entities");
                    if (resp.ok) {
                        const entities = await resp.json();
                        const target = entities.find(e => e.entity_name === customTableName);
                        if (target) vanillaEntityId = target.id;
                    }
                    
                    document.getElementById('result-area').innerHTML = 
                        `<div class="status" style="color:#a0cfff;">✅ 테이블 <code>usr."${customTableName}"</code>이 정상적으로 생성되었습니다! <br>(Entity ID: ${vanillaEntityId || '알수없음'})</div>`;

                } else if (action === 'insert') {
                    title = "➕ 데이터 등록";
                    previewCode = `<span class="kw">const</span> result = <span class="kw">await</span> <span class="fn">Zio.Graph</span>
  .<span class="fn">custom</span>(<span class="str">"${customTableName}"</span>)
  .<span class="fn">create</span>({ title: <span class="str">"바닐라테스트1"</span>, content: <span class="str">"내용무"</span> });`;

                    result = await Zio.Graph.custom(customTableName).create({
                        title: "바닐라테스트1",
                        content: "내용무"
                    });
                    Zio.renderTable('#result-area', result);

                } else if (action === 'update') {
                    title = "✏️ 데이터 수정";
                    previewCode = `<span class="kw">const</span> result = <span class="kw">await</span> <span class="fn">Zio.Graph</span>
  .<span class="fn">custom</span>(<span class="str">"${customTableName}"</span>)
  .<span class="fn">where</span>({ title: <span class="str">"바닐라테스트1"</span> })
  .<span class="fn">update</span>({ content: <span class="str">"내용이 수정되었습니다!"</span> });`;

                    result = await Zio.Graph.custom(customTableName)
                        .where({ title: "바닐라테스트1" })
                        .update({ content: "내용이 수정되었습니다!" });
                    Zio.renderTable('#result-area', result);

                } else if (action === 'fetch') {
                    title = "🔍 데이터 조회";
                    previewCode = `<span class="kw">const</span> result = <span class="kw">await</span> <span class="fn">Zio.Graph</span>
  .<span class="fn">custom</span>(<span class="str">"${customTableName}"</span>)
  .<span class="fn">fetch</span>();`;

                    result = await Zio.Graph.custom(customTableName).fetch();
                    Zio.renderTable('#result-area', result);

                } else if (action === 'delete') {
                    title = "🗑️ 데이터 삭제 (테이블 드롭)";
                    previewCode = `<span class="cmt">// 1. 데이터를 지웁니다</span>
<span class="kw">await</span> <span class="fn">Zio.Graph</span>.<span class="fn">custom</span>(<span class="str">"${customTableName}"</span>).<span class="fn">delete</span>();
<span class="cmt">// 2. 테이블을 드롭합니다</span>
<span class="kw">await</span> <span class="fn">fetch</span>(<span class="str">"/api/custom/entities/"</span> + entityId, { method: <span class="str">"DELETE"</span> });`;

                    // 1. 데이터 삭제
                    await Zio.Graph.custom(customTableName).delete();
                    
                    // 2. 테이블 드롭
                    let detailMsg = "데이터가 일괄 삭제되었습니다.";
                    if (vanillaEntityId) {
                        const delResp = await fetch(`/api/custom/entities/${vanillaEntityId}`, { method: "DELETE" });
                        if (delResp.ok) {
                            detailMsg += " 또한, 메타데이터 및 테이블(usr)이 완전히 드롭되었습니다.";
                            vanillaEntityId = null;
                        }
                    } else {
                        // 만약 entity_id 백업이 없다면, API 리스트에서 다시 찾기
                        const resp = await fetch("/api/custom/entities");
                        if (resp.ok) {
                            const entities = await resp.json();
                            const target = entities.find(e => e.entity_name === customTableName);
                            if (target) {
                                const delResp = await fetch(`/api/custom/entities/${target.id}`, { method: "DELETE" });
                                if (delResp.ok) {
                                    detailMsg += " 또한, 메타데이터 및 테이블(usr)이 완전히 드롭되었습니다.";
                                }
                            }
                        }
                    }
                    
                    document.getElementById('result-area').innerHTML = 
                        `<div class="status" style="color:#fca5a5;">🗑️ ${detailMsg}</div>`;
                }

                document.getElementById('content-title').textContent = title;
                document.getElementById('code-preview').innerHTML = previewCode;

                const elapsed = Math.round(performance.now() - t0);
                if (result && result.data && result.data.length !== undefined) {
                    document.getElementById('badge').textContent = result.data.length + '건';
                    document.getElementById('badge').style.display = 'inline';
                }
                document.getElementById('stats').style.display = 'flex';
                document.getElementById('stat-time').textContent = elapsed;

            } catch (e) {
                document.getElementById('result-area').innerHTML =
                    '<div class="status error">❌ ' + e.message + '</div>';
            }
        }
    </script>
</body>
</html>
