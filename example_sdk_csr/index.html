<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>IT 운영 인사이트 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f9; }
        .table-header { background-color: #f8fafc; }
        .sidebar-item.active { border-color: #3b82f6; background-color: #eff6ff; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex overflow-hidden text-slate-800">

    <!-- Sidebar -->
    <aside class="w-80 bg-white border-r border-gray-200 flex flex-col h-full shadow-sm z-10">
        <div class="p-6 border-b border-gray-200 bg-white">
            <h1 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                ZIO Analytics
            </h1>
            <p class="text-xs text-slate-500 mt-1">Powered by <code class="text-blue-600 font-semibold">zio_ontology</code> SDK</p>
        </div>
        
        <div class="p-4 bg-slate-50 border-b border-gray-100">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="리포트 검색..." class="w-full pl-9 pr-4 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow">
                <svg class="w-4 h-4 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-3" id="sidebarList">
            <div class="text-center text-sm text-gray-400 mt-10">목록을 불러오는 중...</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col bg-[#f8fafc] h-full overflow-hidden relative">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center px-8 justify-between shrink-0 shadow-sm">
            <div>
                <h2 class="text-lg font-semibold text-slate-800" id="reportTitle">리포트를 선택해주세요</h2>
                <p class="text-xs text-slate-500 mt-0.5" id="reportDesc">좌측 목록에서 분석할 항목을 클릭하세요.</p>
            </div>
        </header>

        <!-- Data Area -->
        <div class="flex-1 overflow-auto p-8 relative">
            <div id="loadingOverlay" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 hidden flex-col items-center justify-center">
                <div class="loader mb-4"></div>
                <p class="text-sm font-medium text-slate-600 mt-3">Graph.raw() 실행 중...</p>
            </div>

            <div id="emptyState" class="h-full flex flex-col items-center justify-center text-gray-400">
                <svg class="w-16 h-16 mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <p class="text-lg font-medium text-slate-500">조회할 리포트를 선택하세요</p>
                <p class="text-sm text-slate-400 mt-1">SDK: <code>get_saved_queries()</code> → <code>Graph.raw()</code></p>
            </div>

            <!-- Table Card -->
            <div id="mainContent" class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col hidden" style="max-height: 100%;">
                <div class="overflow-x-auto rounded-t-xl">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead id="tableHead" class="bg-slate-50 sticky top-0 shadow-sm z-10"></thead>
                        <tbody id="tableBody" class="text-sm text-slate-700"></tbody>
                    </table>
                </div>
                <div class="p-4 border-t border-gray-200 bg-slate-50 rounded-b-xl text-xs text-slate-500 flex justify-between items-center shrink-0">
                    <span id="tableFooter">데이터 대기 중...</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        let reports = [];
        let currentActiveId = null;

        const sidebarList = document.getElementById('sidebarList');
        const searchInput = document.getElementById('searchInput');
        const emptyState = document.getElementById('emptyState');
        const mainContent = document.getElementById('mainContent');
        const reportTitle = document.getElementById('reportTitle');
        const reportDesc = document.getElementById('reportDesc');
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const tableFooter = document.getElementById('tableFooter');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // ─────────────────────────────────────────────────────
        // 1. 좌측 목록: SDK get_saved_queries() 기반 엔드포인트
        // ─────────────────────────────────────────────────────
        async function fetchSidebarData() {
            try {
                const res = await fetch('api/reports');
                if (!res.ok) throw new Error("목록을 불러오지 못했습니다.");
                
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                
                reports = data.filter(r => r.query && r.query.trim() !== '');
                renderSidebar();
            } catch (e) {
                sidebarList.innerHTML = `<div class="text-center text-sm text-red-500 mt-10">${e.message}</div>`;
            }
        }

        function renderSidebar(filterText = '') {
            sidebarList.innerHTML = '';
            
            if (reports.length === 0) {
                sidebarList.innerHTML = `<div class="text-center text-sm text-gray-400 mt-10">저장된 리포트가 없습니다.</div>`;
                return;
            }

            reports.forEach(report => {
                if (filterText && !(report.title && report.title.toLowerCase().includes(filterText.toLowerCase()))) return;

                const item = document.createElement('div');
                item.id = `menu-${report.id}`;
                item.className = 'sidebar-item p-4 rounded-xl border border-transparent bg-white shadow-sm cursor-pointer hover:border-blue-300 hover:shadow-md transition-all group';
                item.innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center shrink-0 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        </div>
                        <div>
                            <h3 class="text-sm font-bold text-slate-800 line-clamp-2 leading-snug">${report.title}</h3>
                            <p class="text-xs text-slate-400 mt-1 line-clamp-1">저장된 분석 리포트</p>
                        </div>
                    </div>
                `;
                item.onclick = () => handleSelectReport(report);
                sidebarList.appendChild(item);
            });
        }

        searchInput.addEventListener('input', (e) => renderSidebar(e.target.value));

        // ─────────────────────────────────────────────────────
        // 2. 동적 파라미터($prompt) 입력 모달
        // ─────────────────────────────────────────────────────
        async function resolveParamsWithUserPrompt(params) {
            const resolvedParams = { ...params };
            const promptFields = Object.entries(params || {}).filter(([_, v]) => 
                typeof v === 'string' && (v === '$prompt' || v.startsWith('$prompt:'))
            );

            if (promptFields.length > 0) {
                let htmlContent = `<div class="text-left mt-4 space-y-4">`;
                promptFields.forEach(([key, v]) => {
                    const defaultValue = v.includes(':') ? v.split(':', 2)[1] : '';
                    htmlContent += `
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">${key}</label>
                            <input id="swal-input-${key}" class="w-full px-4 py-2 bg-slate-50 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-all" value="${defaultValue}">
                        </div>
                    `;
                });
                htmlContent += `</div>`;

                const { value: formValues, isConfirmed } = await Swal.fire({
                    title: '<span class="text-xl font-bold text-slate-800">파라미터 입력</span>',
                    html: htmlContent,
                    focusConfirm: false,
                    showCancelButton: true,
                    confirmButtonText: '데이터 조회',
                    cancelButtonText: '취소',
                    confirmButtonColor: '#3b82f6',
                    cancelButtonColor: '#94a3b8',
                    customClass: { popup: 'rounded-2xl' },
                    preConfirm: () => {
                        const results = {};
                        let missing = false;
                        promptFields.forEach(([key]) => {
                            const val = document.getElementById(`swal-input-${key}`).value.trim();
                            if (!val) missing = true;
                            results[key] = val;
                        });
                        if (missing) {
                            Swal.showValidationMessage('모든 값을 입력해주세요.');
                            return false;
                        }
                        return results;
                    }
                });

                if (!isConfirmed) return null;
                Object.assign(resolvedParams, formValues);
            }
            
            return resolvedParams;
        }

        // ─────────────────────────────────────────────────────
        // 3. 우측 데이터: SDK Graph.raw() 기반 엔드포인트
        // ─────────────────────────────────────────────────────
        async function handleSelectReport(report) {
            // 사이드바 활성화
            if (currentActiveId) {
                const prev = document.getElementById(`menu-${currentActiveId}`);
                if (prev) prev.classList.remove('active');
            }
            document.getElementById(`menu-${report.id}`).classList.add('active');
            currentActiveId = report.id;

            // 타이틀 업데이트
            reportTitle.innerText = report.title;
            reportDesc.innerText = "저장된 분석 리포트";
            emptyState.style.display = 'none';
            mainContent.style.display = 'flex';

            // 파라미터 프롬프트 (필요시)
            const finalParams = await resolveParamsWithUserPrompt(report.params);
            if (!finalParams) return;

            // 로딩 시작
            loadingOverlay.style.display = 'flex';
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';
            tableFooter.innerText = "Graph.raw() 실행 중...";

            try {
                const response = await fetch('api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: report.query, params: finalParams })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || err.detail || "서버 에러가 발생했습니다.");
                }

                const apiResult = await response.json();
                window.currentRawData = apiResult.data || [];
                
                // Neo4j 객체를 평탄화(Flatten)
                const flatData = (apiResult.data || []).map(row => {
                    const flatRow = {};
                    Object.keys(row).forEach(key => {
                        const val = row[key];
                        if (val && typeof val === 'object') {
                            if (val._nodes && Array.isArray(val._nodes)) {
                                flatRow[key] = val._nodes.map(n => n._display || n.name || n.title || 'Node').join(' ➔ ');
                            } else if (!Array.isArray(val)) {
                                Object.keys(val).forEach(innerKey => {
                                    flatRow[`${key}.${innerKey}`] = val[innerKey];
                                });
                            } else {
                                flatRow[key] = val;
                            }
                        } else {
                            flatRow[key] = val;
                        }
                    });
                    return flatRow;
                });
                
                if (flatData.length === 0) {
                    tableBody.innerHTML = `<tr><td class="p-16 text-center text-gray-400">
                        <svg class="w-12 h-12 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                        조건에 맞는 데이터가 없습니다.</td></tr>`;
                    tableFooter.innerText = "총 0건의 데이터가 조회되었습니다.";
                    return;
                }

                // 테이블 헤더
                const keys = Object.keys(flatData[0]).filter(k => !k.endsWith('._id') && !k.endsWith('._labels') && !k.endsWith('._type') && !k.endsWith('._start') && !k.endsWith('._end'));
                const map = report.columns_map || {};
                
                let thHtml = '<tr class="table-header border-b border-gray-200 text-sm text-slate-600">';
                keys.forEach(key => {
                    let colName = map[key] || key.replace('._display', '').replace('.name', '').replace('.title', '');
                    thHtml += `<th class="p-4 font-semibold">${colName}</th>`;
                });
                thHtml += '</tr>';
                tableHead.innerHTML = thHtml;

                // 테이블 바디
                let tbHtml = '';
                flatData.forEach((row, index) => {
                    tbHtml += `<tr onclick="showRowDetails(${index})" class="hover:bg-blue-50 transition border-b border-gray-100 last:border-0 cursor-pointer">`;
                    keys.forEach(key => {
                        let val = row[key];
                        if (val === null || val === undefined || val === '') val = '-';
                        else if (typeof val === 'object') val = JSON.stringify(val);
                        
                        if (val === '긴급') val = `<span class="px-2 py-1 bg-red-100 text-red-700 rounded-full text-xs font-bold">${val}</span>`;
                        else if (val === '경고') val = `<span class="px-2 py-1 bg-orange-100 text-orange-700 rounded-full text-xs font-bold">${val}</span>`;
                        else if (String(val).length > 50) val = `<span class="truncate block max-w-xs" title="${val}">${val}</span>`;
                        
                        tbHtml += `<td class="p-4">${val}</td>`;
                    });
                    tbHtml += '</tr>';
                });
                tableBody.innerHTML = tbHtml;
                tableFooter.innerText = `총 ${flatData.length}건의 데이터가 조회되었습니다.`;

            } catch (error) {
                tableBody.innerHTML = `<tr><td class="p-12 text-center text-red-500 font-medium">조회 실패: ${error.message}</td></tr>`;
                tableFooter.innerText = "에러 발생";
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        // ─────────────────────────────────────────────────────
        // 4. 행 클릭 시 상세 JSON 모달
        // ─────────────────────────────────────────────────────
        function showRowDetails(index) {
            if (!window.currentRawData || !window.currentRawData[index]) return;
            
            const rawObj = window.currentRawData[index];
            const jsonStr = JSON.stringify(rawObj, null, 2);
            
            Swal.fire({
                title: '<span class="text-lg font-bold text-slate-800">상세 데이터 (JSON)</span>',
                html: `<div class="text-left bg-slate-900 rounded-lg p-4 mt-2 overflow-x-auto max-h-96 overflow-y-auto">
                          <pre><code class="text-sm text-green-400 font-mono">${jsonStr}</code></pre>
                       </div>`,
                width: '600px',
                focusConfirm: true,
                confirmButtonText: '닫기',
                confirmButtonColor: '#3b82f6',
                customClass: { popup: 'rounded-2xl' }
            });
        }

        // ─────────────────────────────────────────────────────
        // 0. 서버 연결 감지 (main.py 실행 여부 자동 확인)
        // ─────────────────────────────────────────────────────
        async function init() {
            try {
                const res = await fetch('api/reports');
                if (!res.ok) throw new Error();
                // 서버 정상 → 대시보드 로드
                const data = await res.json();
                if (data.error) throw new Error();
                reports = data.filter(r => r.query && r.query.trim() !== '');
                renderSidebar();
            } catch (e) {
                // 서버 없음 → 안내 메시지 표시
                document.body.innerHTML = `
                    <div style="display:flex; align-items:center; justify-content:center; width:100%; height:100vh; background:#f4f7f9; font-family:'Pretendard',sans-serif;">
                        <div style="text-align:center; max-width:520px; padding:48px; background:white; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,0.08);">
                            <div style="width:64px; height:64px; margin:0 auto 24px; background:linear-gradient(135deg,#3b82f6,#6366f1); border-radius:16px; display:flex; align-items:center; justify-content:center;">
                                <svg width="32" height="32" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            </div>
                            <h2 style="color:#0f172a; margin-bottom:8px; font-size:22px; font-weight:700;">main.py를 먼저 실행해주세요</h2>
                            <p style="color:#64748b; font-size:14px; margin-bottom:28px;">
                                이 대시보드는 <strong>zio_ontology SDK</strong>를 통해<br>Neo4j 서버에서 실시간 데이터를 조회합니다.
                            </p>
                            <div style="text-align:left; background:#f8fafc; padding:24px; border-radius:12px; font-size:13.5px; color:#334155; line-height:2.2; border:1px solid #e2e8f0;">
                                <strong style="color:#3b82f6;">Step 1.</strong> 좌측 탐색기에서 <code style="background:#e2e8f0; padding:2px 8px; border-radius:4px; font-weight:600;">main.py</code> 선택<br>
                                <strong style="color:#3b82f6;">Step 2.</strong> 에디터 상단의 <strong>▶ Run</strong> 버튼 클릭<br>
                                <strong style="color:#3b82f6;">Step 3.</strong> 콘솔에 출력된 <strong style="color:#059669;">외부 URL</strong>로 접속
                            </div>
                            <p style="color:#94a3b8; font-size:12px; margin-top:20px;">
                                ※ 이 파일(index.html)을 직접 미리보기로 열면 서버가 없어 동작하지 않습니다.
                            </p>
                        </div>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
