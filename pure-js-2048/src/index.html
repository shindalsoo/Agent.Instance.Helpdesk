<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>2048</h1>
            <div class="score-container">
                <div>Score: <span id="score">0</span></div>
                <div>Best: <span id="best">0</span></div>
            </div>
        </div>
        <div id="game-wrapper" style="position: relative;">
            <div id="grid" class="grid"></div>
            <div id="game-over-message" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(238, 228, 218, 0.73); align-items: center; justify-content: center; font-size: 40px; font-weight: bold; color: #776e65;">
                Game Over!
            </div>
        </div>
        <button id="restart">New Game</button>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
